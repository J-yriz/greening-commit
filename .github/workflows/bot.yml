name: Green Commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: green-commit-main
  cancel-in-progress: false

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Run update task
        run: bash task.sh

      - name: Rebase with remote main
        run: git pull --rebase origin main

      - name: Push commit to main
        run: git push origin HEAD:main
